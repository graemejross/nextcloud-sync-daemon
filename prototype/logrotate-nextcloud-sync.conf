# Logrotate configuration for Nextcloud sync prototype.
#
# Paths must be updated to match your SYNC_LOG_DIR from config.sh.
# Example: if SYNC_LOG_DIR=/home/user/nextcloud-server, use the paths below.
#
# Install:
#   sudo cp logrotate-nextcloud-sync.conf /etc/logrotate.d/nextcloud-sync

/home/user/nextcloud-server/sync.log
/home/user/nextcloud-server/watch.log
/home/user/nextcloud-server/webhook.log
{
    su user user
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    maxsize 100M
    copytruncate
}
