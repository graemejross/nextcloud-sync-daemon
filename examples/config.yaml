# nextcloud-sync-daemon configuration
#
# All durations accept Go duration strings ("5m", "30s", "1h30m")
# or integer seconds (120 = 2 minutes).

server:
  # Nextcloud server URL (required)
  url: https://cloud.example.com

  # Nextcloud username (required)
  username: sync-user

  # Password — use one of these (not both):
  # Inline password:
  # password: your-app-password
  # Password file (read at each sync, supports rotation):
  password_file: /etc/nextcloud-sync-daemon/password
  # SECURITY: Password file should have restricted permissions:
  #   chmod 600 /etc/nextcloud-sync-daemon/password
  # The daemon warns at startup if the file is readable by group/others.
  #
  # NOTE: The password is passed as a command-line argument to nextcloudcmd,
  # which means it is visible via 'ps' to other users on the system.
  # Mitigations:
  #   - Use a Nextcloud app password (limited scope) instead of the main password
  #   - Run the daemon as a dedicated user
  #   - Use ProtectProc=invisible in the systemd unit (hides /proc from other users)

sync:
  # Local directory to sync (required)
  local_dir: /home/user/nextcloud

  # Remote path on Nextcloud server (default: /)
  remote_path: /

  # Path to nextcloudcmd binary (default: nextcloudcmd, found via PATH)
  # nextcloudcmd: /usr/bin/nextcloudcmd

  # Extra arguments passed to nextcloudcmd before the standard args
  # extra_args: ["--silent"]

  # Maximum time for a single sync run (default: 5m)
  timeout: 5m

watch:
  # Enable filesystem watching for local changes (default: false)
  enabled: true

  # Batch rapid filesystem events into a single sync trigger (default: 10s)
  debounce: 10s

  # Minimum interval between syncs triggered by the watcher (default: 30s)
  # Must be >= debounce
  cooldown: 30s

  # File patterns to ignore (regex, matched against relative path)
  exclude:
    - '\.sync_.*\.db'

webhook:
  # Enable webhook listener for server push events (default: false)
  enabled: false

  # Address to listen on (default: 0.0.0.0:8767)
  listen: 0.0.0.0:8767

  # Shared secret for webhook validation (required if webhook enabled)
  # Must match the secret configured in Nextcloud's webhook_listeners app
  # Requests from the same IP are rate-limited to one every 5 seconds.
  # secret: your-webhook-secret

  # Only trigger sync for changes under this path prefix (default: /)
  path_filter: /

poll:
  # Enable polling fallback (default: false)
  enabled: true

  # Polling interval (default: 60s)
  interval: 60s

notify_push:
  # Enable Nextcloud notify_push (WebSocket) for near-real-time server events.
  # Requires the notify_push app installed on the Nextcloud server.
  # No inbound ports needed — connects outbound to the server.
  enabled: false

  # WebSocket endpoint URL (optional — auto-discovered from server capabilities if omitted)
  # url: wss://cloud.example.com/push/ws

  # Reconnect backoff: initial delay and maximum delay (default: 5s / 5m)
  # reconnect_interval: 5s
  # reconnect_max: 5m

logging:
  # Log level: debug, info, warn, error (default: info)
  level: info

  # Log format: text (human-readable) or json (machine-parseable) (default: text)
  # Logs are written to stderr for systemd journal integration
  format: text

health:
  # Enable health check endpoint (default: false)
  enabled: false

  # Address for health endpoint (default: 127.0.0.1:8768, localhost only)
  # WARNING: If bound to 0.0.0.0, sync status (uptime, sync counts, failure
  # rates, active sources, last sync time) is exposed to the network.
  listen: 127.0.0.1:8768
